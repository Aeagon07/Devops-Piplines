name: CI Pipline

on:                         # Trigger the workflow on push to the main branch 
  push:
    branches: [ main ]

jobs:                      # one or more jobs to run as part of the workflow
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Run tests  
      run: npm test